---
- name: Creazione utenti 
  hosts: all
  become: true 

  vars: 
    users: 
     - nome: user1 
       gruppo: group1 
       #home: path1 
       shell: /bin/bash 

     - nome: user2
       gruppo: group2 
       #home: path2 
       shell: /bin/bash

  tasks: 
  
    - name: Creazione utenti
      ansible.builtin.user: 
        name: "{{ item.nome }}"
        group: "{{ item.gruppo }}"
        #home: "{{ item.home }}"
        shell: "{{ item.shell }}"
        state: present 
      loop: "{{ users }}"
